name: Fetch news

# REDUNDANT / DISABLED SCHEDULE. The daily news fetch is now owned by the Vercel
# cron in vercel.json (/api/cron/news at "0 1 * * *"). This Action used to run the
# SAME endpoint at the SAME time, which double-fetched. The schedule below is
# commented out to stop the overlap; only the Vercel cron runs it automatically.
# Kept as a manual fallback: trigger via "Run workflow" (workflow_dispatch) if the
# Vercel cron is ever down. Re-enable the schedule only if Vercel's cron is removed.

on:
  # schedule:
  #   - cron: "0 1 * * *"   # disabled: handled by vercel.json cron (see note above)
  workflow_dispatch: {}

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger news fetch endpoint
        env:
          CRON_URL: ${{ secrets.NEWS_CRON_URL }}
          CRON_SECRET: ${{ secrets.NEWS_CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Set repo secrets NEWS_CRON_URL and NEWS_CRON_SECRET first."
            exit 1
          fi
          echo "Fetching news..."
          curl -fsS -m 180 -X GET "$CRON_URL" -H "x-cron-secret: $CRON_SECRET"
          echo ""
          echo "Done."
